<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Quiz Results</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#737686",
                    "on-secondary-fixed": "#2e1500",
                    "error": "#ba1a1a",
                    "surface-container": "#edeef0",
                    "on-tertiary-container": "#ffccbc",
                    "primary-fixed": "#dbe1ff",
                    "surface-container-high": "#e7e8ea",
                    "primary": "#003da6",
                    "background": "#f8f9fb",
                    "on-primary": "#ffffff",
                    "outline-variant": "#c3c6d7",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#ffdcc1",
                    "surface-container-highest": "#e1e2e4",
                    "on-surface": "#191c1e",
                    "tertiary": "#822600",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f3f4f6",
                    "on-surface-variant": "#434654",
                    "surface-bright": "#f8f9fb",
                    "tertiary-fixed": "#ffdbd0",
                    "inverse-primary": "#b4c5ff",
                    "on-primary-container": "#cbd6ff",
                    "tertiary-container": "#aa3500",
                    "secondary": "#8e4e00",
                    "surface": "#f8f9fb",
                    "tertiary-fixed-dim": "#ffb59c",
                    "on-tertiary-fixed-variant": "#832700",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#f0f1f3",
                    "secondary-fixed-dim": "#ffb778",
                    "on-secondary-fixed-variant": "#6c3a00",
                    "on-primary-fixed": "#00174b",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#390c00",
                    "inverse-surface": "#2e3132",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#0353da",
                    "surface-dim": "#d9dadc",
                    "secondary-container": "#fd9000",
                    "primary-container": "#0052d9",
                    "on-secondary-container": "#613400",
                    "surface-variant": "#e1e2e4",
                    "on-background": "#191c1e"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "xs": "4px",
                    "md": "16px",
                    "base": "8px",
                    "container-padding": "16px",
                    "sm": "12px",
                    "card-gap": "12px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "question-text": ["Lexend"],
                    "label-sm": ["Lexend"],
                    "body-md": ["Lexend"],
                    "caption": ["Lexend"],
                    "option-text": ["Lexend"],
                    "display-lg": ["Lexend"]
            },
            "fontSize": {
                    "question-text": ["18px", {"lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "500"}],
                    "label-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "caption": ["12px", {"lineHeight": "16px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "option-text": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pb-safe">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 font-lexend text-base font-semibold text-blue-600 dark:text-blue-400 docked full-width top-0 z-50 sticky border-b border-slate-100 dark:border-slate-800 shadow-sm dark:shadow-none flex justify-between items-center w-full px-4 h-14">
<button class="flex items-center justify-center w-10 h-10 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full active:opacity-70 transition-opacity text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-lg font-bold text-blue-600 dark:text-blue-400">Study Portal</span>
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="person">person</span>
</div>
</header>
<main class="flex-1 overflow-y-auto px-container-padding py-xl flex flex-col items-center">
<!-- Score Overview Header -->
<div class="text-center mb-xl w-full max-w-md">
<h1 class="font-display-lg text-display-lg text-on-background mb-xs">Quiz Completed</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Great effort! Here is your performance breakdown.</p>
</div>
<!-- Circular Progress Chart Area -->
<div class="relative w-48 h-48 mb-xl flex items-center justify-center">
<!-- Background Ring -->
<svg class="absolute w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle class="text-surface-variant" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="8"></circle>
<!-- Progress Ring (85%) -->
<circle class="text-primary transition-all duration-1000 ease-out" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-dasharray="282.7" stroke-dashoffset="42.4" stroke-width="8"></circle>
</svg>
<div class="absolute flex flex-col items-center justify-center text-center bg-white rounded-full w-36 h-36 shadow-[0_4px_24px_rgba(0,0,0,0.06)] border border-surface-variant z-10">
<span class="font-display-lg text-[40px] leading-tight text-primary font-bold">85%</span>
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-widest mt-1">Accuracy</span>
</div>
</div>
<!-- Stats Grid (Bento Style) -->
<div class="grid grid-cols-2 gap-sm w-full max-w-md mb-xl">
<!-- Total Questions -->
<div class="bg-white border border-outline-variant shadow-[0_4px_8px_rgba(0,0,0,0.02)] rounded-lg p-md flex flex-col items-start justify-center">
<div class="flex items-center space-x-2 mb-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="format_list_bulleted">format_list_bulleted</span>
<span class="font-caption text-caption">Total Questions</span>
</div>
<span class="font-question-text text-question-text text-on-background">20</span>
</div>
<!-- Time Spent -->
<div class="bg-white border border-outline-variant shadow-[0_4px_8px_rgba(0,0,0,0.02)] rounded-lg p-md flex flex-col items-start justify-center">
<div class="flex items-center space-x-2 mb-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="timer">timer</span>
<span class="font-caption text-caption">Time Spent</span>
</div>
<span class="font-question-text text-question-text text-on-background">14:32</span>
</div>
<!-- Correct Answers -->
<div class="bg-surface-bright border border-primary/20 shadow-[0_4px_8px_rgba(0,0,0,0.02)] rounded-lg p-md flex flex-col items-start justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex items-center space-x-2 mb-2 text-primary">
<span class="material-symbols-outlined text-[20px] font-bold" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-caption text-caption font-semibold">Correct</span>
</div>
<span class="font-question-text text-question-text text-on-background">17</span>
</div>
<!-- Wrong Answers -->
<div class="bg-surface-bright border border-error/20 shadow-[0_4px_8px_rgba(0,0,0,0.02)] rounded-lg p-md flex flex-col items-start justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-error/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex items-center space-x-2 mb-2 text-error">
<span class="material-symbols-outlined text-[20px] font-bold" data-icon="cancel" data-weight="fill" style="font-variation-settings: 'FILL' 1;">cancel</span>
<span class="font-caption text-caption font-semibold">Incorrect</span>
</div>
<span class="font-question-text text-question-text text-on-background">3</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col space-y-sm w-full max-w-md mt-auto">
<button class="w-full bg-primary text-on-primary font-label-sm text-label-sm py-3 px-6 rounded-lg shadow-[0_2px_8px_rgba(0,0,0,0.12)] hover:bg-primary-container hover:text-on-primary-container active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
<span class="material-symbols-outlined" data-icon="replay">replay</span>
<span>Retry Practice</span>
</button>
<button class="w-full bg-white border border-primary text-primary font-label-sm text-label-sm py-3 px-6 rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span>Back Home</span>
</button>
</div>
</main>
</body></html>
