<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>错题解析</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#ffdcc5",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#eff4ff",
                        "on-surface-variant": "#434655",
                        "tertiary": "#006242",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-bright": "#f8f9ff",
                        "surface-container": "#e5eeff",
                        "on-tertiary-container": "#bdffdb",
                        "outline": "#737686",
                        "on-secondary-fixed": "#301400",
                        "error": "#ba1a1a",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-high": "#dce9ff",
                        "outline-variant": "#c3c6d7",
                        "error-container": "#ffdad6",
                        "primary": "#004ac6",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#002113",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#0053db",
                        "inverse-surface": "#213145",
                        "secondary-container": "#fd933d",
                        "surface-dim": "#cbdbf5",
                        "surface-variant": "#d3e4fe",
                        "on-background": "#0b1c30",
                        "primary-container": "#2563eb",
                        "on-secondary-container": "#693300",
                        "inverse-primary": "#b4c5ff",
                        "on-primary-container": "#eeefff",
                        "tertiary-fixed": "#6ffbbe",
                        "secondary": "#944a00",
                        "tertiary-container": "#007d55",
                        "surface": "#f8f9ff",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-secondary-fixed-variant": "#713700",
                        "on-primary-fixed": "#00174b",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "secondary-fixed-dim": "#ffb783"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "md": "16px",
                        "xl": "32px",
                        "unit": "4px",
                        "sm": "8px",
                        "card-gutter": "12px",
                        "lg": "24px",
                        "container-padding": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Lexend"],
                        "headline-md": ["Lexend"],
                        "headline-lg": ["Lexend"],
                        "body-md": ["Lexend"],
                        "label-lg": ["Lexend"],
                        "body-lg": ["Lexend"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-md": ["18px", { "lineHeight": "26px", "fontWeight": "600" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen text-on-background font-body-md pt-14 pb-20">
<!-- TopAppBar -->
<header class="bg-white dark:bg-gray-900 docked full-width top-0 border-b border-gray-100 dark:border-gray-800 flat no shadows flex justify-between items-center w-full px-4 h-14 fixed z-50">
<button class="text-blue-600 dark:text-blue-400 font-lexend text-lg font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-200 active:opacity-70 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-on-background font-bold tracking-tight">错题解析</h1>
<button class="text-gray-500 dark:text-gray-400 font-lexend text-lg font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-200 active:opacity-70 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto">
<!-- Tab Bar -->
<div class="px-container-padding py-sm bg-white border-b border-surface-variant flex gap-md overflow-x-auto sticky top-14 z-40">
<button class="flex-shrink-0 px-md py-sm rounded-full bg-primary-container text-on-primary-container font-label-lg transition-colors">
                Current Session Mistakes
            </button>
<button class="flex-shrink-0 px-md py-sm rounded-full text-on-surface-variant font-label-lg hover:bg-surface-container transition-colors">
                Historical Mistakes
            </button>
</div>
<!-- Mistake List Container -->
<div class="p-container-padding space-y-lg">
<!-- Mistake Card 1 -->
<article class="bg-surface-container-lowest rounded-xl p-card-gutter shadow-sm flex flex-col gap-sm">
<div class="flex justify-between items-start">
<span class="bg-error-container text-on-error-container px-xs py-xs rounded text-label-sm font-label-sm">单选题</span>
<span class="text-outline font-label-sm">Question 3</span>
</div>
<p class="font-body-lg text-on-background mt-sm">在微观经济学中，如果一种商品的价格下降导致对其需求量增加，这种现象通常被称为？</p>
<div class="mt-md space-y-sm">
<!-- Incorrect Answer -->
<div class="flex items-center gap-sm p-sm rounded-lg bg-error-container/20 border border-error/20">
<span class="material-symbols-outlined text-error" data-icon="cancel" style="font-variation-settings: 'FILL' 1;">cancel</span>
<div class="flex-1">
<span class="font-body-md text-on-surface">A. 替代效应</span>
<p class="text-label-sm text-error mt-xs">你的答案</p>
</div>
</div>
<!-- Correct Answer -->
<div class="flex items-center gap-sm p-sm rounded-lg bg-tertiary-container/10 border border-tertiary/20">
<span class="material-symbols-outlined text-tertiary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="flex-1">
<span class="font-body-md text-on-surface">B. 需求定理</span>
<p class="text-label-sm text-tertiary mt-xs">正确答案</p>
</div>
</div>
</div>
<div class="mt-md pt-sm border-t border-surface-variant flex justify-end">
<button class="flex items-center gap-xs px-md py-sm bg-primary-fixed text-on-primary-fixed rounded-full font-label-lg hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="replay">replay</span>
                        重做此题
                    </button>
</div>
</article>
<!-- Mistake Card 2 -->
<article class="bg-surface-container-lowest rounded-xl p-card-gutter shadow-sm flex flex-col gap-sm">
<div class="flex justify-between items-start">
<span class="bg-error-container text-on-error-container px-xs py-xs rounded text-label-sm font-label-sm">多选题</span>
<span class="text-outline font-label-sm">Question 7</span>
</div>
<p class="font-body-lg text-on-background mt-sm">以下哪些因素可能导致通货膨胀？（多选）</p>
<div class="mt-md space-y-sm">
<!-- User's Partial Answer (Incorrect marked) -->
<div class="flex items-center gap-sm p-sm rounded-lg bg-error-container/20 border border-error/20">
<span class="material-symbols-outlined text-error" data-icon="cancel" style="font-variation-settings: 'FILL' 1;">cancel</span>
<div class="flex-1">
<span class="font-body-md text-on-surface">A. 货币供应量增加, C. 生产成本下降</span>
<p class="text-label-sm text-error mt-xs">你的答案 (漏选/错选)</p>
</div>
</div>
<!-- Correct Answer -->
<div class="flex items-center gap-sm p-sm rounded-lg bg-tertiary-container/10 border border-tertiary/20">
<span class="material-symbols-outlined text-tertiary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="flex-1">
<span class="font-body-md text-on-surface">A. 货币供应量增加, B. 需求拉动, D. 成本推动</span>
<p class="text-label-sm text-tertiary mt-xs">正确答案</p>
</div>
</div>
</div>
<div class="mt-md pt-sm border-t border-surface-variant flex justify-between items-center">
<button class="text-primary font-label-sm hover:underline flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="lightbulb">lightbulb</span> 查看解析详情
                    </button>
<button class="flex items-center gap-xs px-md py-sm bg-primary-fixed text-on-primary-fixed rounded-full font-label-lg hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="replay">replay</span>
                        重做此题
                    </button>
</div>
</article>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 border-t border-gray-100 dark:border-gray-800 shadow-[0_-4px_20px_rgba(37,99,235,0.05)] bg-white/80 backdrop-blur-md flex justify-around items-center px-4 py-2 h-[60px]">
<button class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-blue-500 scale-95 transition-transform duration-150 gap-1">
<span class="material-symbols-outlined text-xl" data-icon="edit_note">edit_note</span>
<span class="font-lexend text-[10px] font-medium">Exercise</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-blue-500 scale-95 transition-transform duration-150 gap-1">
<span class="material-symbols-outlined text-xl" data-icon="list_alt">list_alt</span>
<span class="font-lexend text-[10px] font-medium">Analysis</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-blue-500 scale-95 transition-transform duration-150 gap-1">
<span class="material-symbols-outlined text-xl" data-icon="insights">insights</span>
<span class="font-lexend text-[10px] font-medium">Ability</span>
</button>
<button class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 rounded-xl px-3 py-1 scale-95 transition-transform duration-150 gap-1">
<span class="material-symbols-outlined text-xl" data-icon="error_outline" style="font-variation-settings: 'FILL' 1;">error_outline</span>
<span class="font-lexend text-[10px] font-medium">Mistakes</span>
</button>
</nav>
</body></html>
