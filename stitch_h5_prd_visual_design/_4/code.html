<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center w-full px-4 h-14 sticky top-0 z-50">
<button class="text-blue-600 dark:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-800 p-2 rounded-full transition-colors duration-200 active:opacity-70 flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-lexend text-lg font-semibold text-blue-600 dark:text-blue-400 text-center flex-1">智能练习</h1>
<div class="flex items-center text-gray-500 font-label-lg px-2 py-1 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-[18px] mr-1">timer</span>
            00:43
        </div>
</header>
<!-- Main Content Canvas -->
<main class="p-container-padding max-w-2xl mx-auto space-y-lg">
<!-- Material Reading Material Card -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_20px_rgba(37,99,235,0.03)] border border-surface-container-low">
<div class="flex items-center mb-sm">
<div class="w-1 h-4 bg-primary rounded-full mr-2"></div>
<h2 class="font-label-sm text-outline">材料阅读</h2>
</div>
<p class="font-body-lg text-on-surface-variant leading-relaxed text-justify">
                2023年，我国互联网企业规模快速扩张，各项核心指标均保持稳健增长态势。根据最新数据统计，全年规模以上互联网企业实现业务收入17483亿元，同比增长6.8%。其中，信息服务收入占比达到54%，成为拉动行业增长的核心动力。随着5G、人工智能等新兴技术的深度融合应用，预计未来三年内，产业数字化转型步伐将进一步加快，为经济高质量发展注入新动能。
            </p>
</section>
<!-- Question Card -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_20px_rgba(37,99,235,0.03)] border border-surface-container-low">
<div class="flex items-center justify-between mb-md">
<div class="flex items-center gap-2">
<span class="bg-primary-container text-on-primary-container font-label-sm px-2 py-1 rounded-md">单选</span>
<span class="font-headline-md text-on-surface">1/20</span>
</div>
</div>
<h3 class="font-headline-md text-on-surface mb-lg">
                根据上述材料，2023年我国规模以上互联网企业业务收入同比增长率为多少？
            </h3>
<!-- Options -->
<div class="space-y-card-gutter">
<!-- Option A - Unselected -->
<label class="flex items-center p-md rounded-lg border border-outline-variant bg-surface-bright cursor-pointer transition-colors hover:bg-surface-container-low">
<input class="hidden" name="question1" type="radio"/>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center text-outline-variant font-headline-md mr-md">A</div>
<span class="font-body-lg text-on-surface-variant">5.4%</span>
</label>
<!-- Option B - Selected -->
<label class="flex items-center p-md rounded-lg border-2 border-primary bg-surface-container-low cursor-pointer transition-colors shadow-[0_2px_8px_rgba(37,99,235,0.1)]">
<input checked="" class="hidden" name="question1" type="radio"/>
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary font-headline-md mr-md">B</div>
<span class="font-body-lg text-primary font-medium">6.8%</span>
</label>
<!-- Option C - Unselected -->
<label class="flex items-center p-md rounded-lg border border-outline-variant bg-surface-bright cursor-pointer transition-colors hover:bg-surface-container-low">
<input class="hidden" name="question1" type="radio"/>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center text-outline-variant font-headline-md mr-md">C</div>
<span class="font-body-lg text-on-surface-variant">7.2%</span>
</label>
<!-- Option D - Unselected -->
<label class="flex items-center p-md rounded-lg border border-outline-variant bg-surface-bright cursor-pointer transition-colors hover:bg-surface-container-low">
<input class="hidden" name="question1" type="radio"/>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center text-outline-variant font-headline-md mr-md">D</div>
<span class="font-body-lg text-on-surface-variant">8.6%</span>
</label>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
